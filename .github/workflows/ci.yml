name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop, v2.1]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore src/WinPrint.slnx /p:Configuration=Debug /p:Platform=x64

      - name: Build analyzer
        # Pre-build the WinPrint.Analyzers project so the solution build doesn't
        # race two TargetFramework builds against the same Analyzer DLL output.
        run: dotnet build tools/WinPrint.Analyzers/WinPrint.Analyzers.csproj --no-restore /p:Configuration=Debug

      - name: Build
        run: dotnet build src/WinPrint.slnx --no-restore /p:Configuration=Debug /p:Platform=x64 /p:DefineConstants="CI_BUILD"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Verify code style
        shell: bash
        run: |
          dotnet jb cleanupcode src/WinPrint.slnx --no-build --verbosity=WARN
          dotnet format src/WinPrint.slnx --no-restore
          git diff --exit-code

      - name: Test
        run: dotnet test tests/WinPrint.Core.UnitTests/WinPrint.Core.UnitTests.csproj --configuration Debug -p:Platform=x64 --no-build --verbosity normal
